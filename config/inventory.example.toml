# =============================================================================
# SONiC Device Inventory -- Example
# =============================================================================
#
# An inventory is a flat catalogue of every device the framework can contact:
# DUTs, fanout switches, PTF containers, console servers, neighbor VMs.
#
# Standard testbed wiring:
#
#   Tester Server (PTF)  <-->  Fanout Switch  <-->  DUT (SONiC)
#
# All three devices appear here with their management IPs and credentials.
#
# Validate with:  sonic-mgmt config validate config/inventory.example.toml
# =============================================================================

# ---------------------------------------------------------------------------
# DUT
# ---------------------------------------------------------------------------

[devices.sonic-dut-1]
mgmt_ip     = "10.0.0.1"
device_type = "sonic"
platform    = "mellanox"
hwsku       = "ACS-MSN2700"

  [devices.sonic-dut-1.credentials]
  username = "admin"
  password = "password"

  [devices.sonic-dut-1.connection]
  connection_type = "ssh"
  port            = 22

  [devices.sonic-dut-1.metadata]
  rack   = "A01"
  serial = "MLX123456"

# ---------------------------------------------------------------------------
# Fanout switch
# ---------------------------------------------------------------------------

[devices.fanout-1]
mgmt_ip     = "10.0.1.1"
device_type = "fanout"
platform    = "mellanox"
hwsku       = "MSN2700"

  [devices.fanout-1.credentials]
  username = "admin"
  password = "admin"

  [devices.fanout-1.connection]
  connection_type = "ssh"
  port            = 22

  # Out-of-band console access for recovery.
  [devices.fanout-1.console]
  server   = "console-server-1"
  port     = 3001
  protocol = "ssh"

# ---------------------------------------------------------------------------
# PTF tester container
# ---------------------------------------------------------------------------

[devices.ptf-host]
mgmt_ip     = "10.255.0.188"
device_type = "ptf"
platform    = "virtual"
hwsku       = "ptf"

  [devices.ptf-host.credentials]
  username = "root"
  password = "root"

  [devices.ptf-host.connection]
  connection_type = "ssh"
  port            = 22

# ---------------------------------------------------------------------------
# Neighbor VMs
# ---------------------------------------------------------------------------

[devices.ARISTA01T1]
mgmt_ip     = "10.250.0.2"
device_type = "eos"
platform    = "virtual"
hwsku       = "vEOS"

  [devices.ARISTA01T1.credentials]
  username = "admin"
  password = "admin"

  [devices.ARISTA01T1.connection]
  connection_type = "ssh"
  port            = 22

# ---------------------------------------------------------------------------
# Groups
# ---------------------------------------------------------------------------

[groups]
all     = ["sonic-dut-1", "fanout-1", "ptf-host", "ARISTA01T1"]
duts    = ["sonic-dut-1"]
fanouts = ["fanout-1"]
ptf     = ["ptf-host"]
vms     = ["ARISTA01T1"]
