# =============================================================================
# SONiC Testbed Definition -- Example (T0 topology)
# =============================================================================
#
# A testbed ties together a topology, one or more DUTs, fanout switches,
# a PTF tester container, and the server that hosts it all.
#
# Standard physical wiring:
#
#   Tester Server (PTF)  <-->  Fanout Switch  <-->  DUT (SONiC)
#
# The connection_graph section maps DUT front-panel ports through fanout
# ports to PTF test interfaces. The fanout uses VLANs to isolate traffic.
#
# Validate with:  sonic-mgmt config validate config/testbed.example.toml
# =============================================================================

name  = "vms-t0"
group = "vms"
topo  = "t0"

# Docker image for the PTF container.
ptf_image = "docker-ptf"

# Management IP of the PTF container.
ptf_ip = "10.255.0.188"

# Physical server (hypervisor) hosting VMs and the PTF container.
server = "server-1"

# Base name for neighbor VMs (e.g. VM0100, VM0101, ...).
vm_base = "VM0100"

comment = "Example T0 testbed with fanout wiring"

# ---------------------------------------------------------------------------
# DUTs (devices under test)
# ---------------------------------------------------------------------------

[[duts]]
hostname = "sonic-dut-1"
mgmt_ip  = "10.0.0.1"
hwsku    = "ACS-MSN2700"
platform = "mellanox"

  [duts.credentials]
  username = "admin"
  password = "password"
  # key_path = "/home/user/.ssh/id_rsa"

# ---------------------------------------------------------------------------
# Fanout switches
# ---------------------------------------------------------------------------
#
# Fanout switches sit between the tester server and the DUT. Each fanout
# port carries a single VLAN that maps to one DUT front-panel port and
# one PTF interface.

[[fanouts]]
hostname = "fanout-1"
mgmt_ip  = "10.0.1.1"
platform = "mellanox"
hwsku    = "MSN2700"

  [fanouts.credentials]
  username = "admin"
  password = "admin"

# ---------------------------------------------------------------------------
# Connection graph (physical wiring)
# ---------------------------------------------------------------------------
#
# Each entry maps one DUT port through a fanout port to a PTF interface.
# The VLAN ID isolates traffic on the fanout trunk.

[[connection_graph]]
dut_port    = "Ethernet0"
fanout_host = "fanout-1"
fanout_port = "Ethernet1"
ptf_port    = "eth0"
vlan_id     = 1000

[[connection_graph]]
dut_port    = "Ethernet4"
fanout_host = "fanout-1"
fanout_port = "Ethernet2"
ptf_port    = "eth1"
vlan_id     = 1001

[[connection_graph]]
dut_port    = "Ethernet8"
fanout_host = "fanout-1"
fanout_port = "Ethernet3"
ptf_port    = "eth2"
vlan_id     = 1002

[[connection_graph]]
dut_port    = "Ethernet12"
fanout_host = "fanout-1"
fanout_port = "Ethernet4"
ptf_port    = "eth3"
vlan_id     = 1003

# ---------------------------------------------------------------------------
# Neighbor VMs (optional -- auto-generated from topology when omitted)
# ---------------------------------------------------------------------------

